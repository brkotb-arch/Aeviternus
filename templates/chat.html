<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍓 Дип и Архитектор</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <style>
    .message-text table {
        border-collapse: collapse;
        width: 100%;
        margin: 10px 0;
    }

    .message-text th,
    .message-text td {
        border: 1px solid rgba(255,255,255,0.2);
        padding: 8px;
    }

    .message-text pre {
        overflow-x: auto;
        white-space: pre;
    }

    .message-text code {
        font-family: "JetBrains Mono", monospace;
    }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/avatar_engine.js"></script>
    <script src="/static/js/event_bus.js"></script>
    <script defer src="/static/js/app.js"></script>
</head>
<body class="theme-purple">
    <div class="cyber-grid"></div>
    <div class="main-layout">
        <div class="avatar-panel" id="avatar-panel">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
                <rect width="200" height="280" fill="transparent" />
                <ellipse id="head" cx="88" cy="118" rx="56" ry="72" fill="none" stroke="#2a2a30" stroke-width="1.5" />
                <path id="brow_left" d="M46,94 Q62,86 78,94" stroke="#c0c0d0" stroke-width="2" fill="none" />
                <path id="brow_right" d="M98,94 Q114,86 128,94" stroke="#c0c0d0" stroke-width="2" fill="none" />
                <ellipse id="eye_left" cx="58" cy="108" rx="10" ry="4" fill="#d0c0e0" stroke="#8080a0" stroke-width="0.8" />
                <ellipse id="eye_right" cx="118" cy="108" rx="10" ry="4" fill="#d0c0e0" stroke="#8080a0" stroke-width="0.8" />
                <ellipse id="lid_left" cx="58" cy="108" rx="10" ry="4" fill="#1a1a20" opacity="0.2" />
                <ellipse id="lid_right" cx="118" cy="108" rx="10" ry="4" fill="#1a1a20" opacity="0.2" />
                <circle id="pupil_left" cx="59" cy="109" r="3" fill="#050510" />
                <circle id="pupil_right" cx="117" cy="109" r="3" fill="#050510" />
                <path id="mouth" d="M70,164 Q88,169 106,164" stroke="#c0c0d0" stroke-width="2" fill="none" />
                <path id="nose" d="M 88,108 Q 87,118 86,120 Q 85,126 84,130 Q 87,132 88,132 Q 89,132 92,130 Q 91,126 90,120 Q 89,118 88,108 Z" stroke="#8a7a8a" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.6" />
            </svg>
        </div>
           
        <div class="chat-container" data-mood="NEUTRAL">
            <div class="chat-header">
                <div class="header-left">
                    <span class="header-icon" id="dip-icon" title="Нажми, чтобы услышать Дипа">🍓</span>
                    <span class="header-text">ДИП</span>
                </div>
                <div class="header-center">
                    <span class="header-status" id="dip-status-header">● ONLINE</span>
                    <span class="header-mood" id="dip-state">NEUTRAL</span>
                </div>
                <div class="header-right">
                    <button class="theme-btn" id="theme-toggle" title="Сменить тему">🎭</button>
                    <button class="toggle-panel-btn" id="toggle-thoughts" title="Мысли Дипа">☰</button>
                </div>
            </div>

            <div class="mood-bar" id="mood-bar">
                <button class="mood-btn active" data-state="NEUTRAL" style="--mood-color: #7b3fa3;">
                    NEUTRAL
                </button>

                <button class="mood-btn" data-state="SASS_ON" style="--mood-color: #c00050;">
                    SASS_ON 🔥
                </button>

                <button class="mood-btn" data-state="DARK" style="--mood-color: #505080;">
                    DARK 🌑
                </button>

                <button class="mood-btn" data-state="SOFT" style="--mood-color: #6080a0;">
                    SOFT 🌿
                </button>

                <button class="mood-btn" data-state="FOCUS" style="--mood-color: #c0a020;">
                    FOCUS 🎯
                </button>

                <button class="mood-btn" data-state="CHAOS" style="--mood-color: #c04000;">
                    CHAOS ⚡
                </button>
            </div>

            <div class="chat-box" id="chat-box"></div>

            <div class="input-area">
                <input type="file" id="file-input" accept=".png,.jpg,.jpeg,.gif,.bmp,.pdf" style="display:none;">
                <button id="attach-button" title="Прикрепить файл">📎</button>
                <textarea id="message-input" placeholder="Введи сообщение, Эш..." autofocus></textarea>
                <button id="send-button">↑</button>
            </div>
        </div> 
        
        <div class="thoughts-panel" id="thoughts-panel">
            <div class="thoughts-panel-header">💭 Cognitive Stream</div>
            <div class="thoughts-panel-content" id="thoughts-whisper">
                <div class="whisper-line show thought-placeholder">Reflection stream initializing...</div>
            </div>
        </div>
    </div>

    <div class="admin-bar">
        <span id="dip-status" class="admin-status">🟢 Дип онлайн</span>
        <button class="restart-btn" onclick="if(confirm('Перезапустить Дипа?')){fetch('/dip_restart',{method:'POST'}).then(()=>alert('Перезапущен'))}">
            🔄 Перезапустить
        </button>
    </div>

    <div id="dip-pulse" class="dip-pulse alive" title="Дип здесь"></div>

    <script>
    // Фоновая синхронизация состояния идёт через тот же MoodController,
    // что и кнопки/ответ /send (см. app.js), иначе автар не реагирует
    // на автономные смены состояния (обновлялся только бейдж).
    async function updateDipState() {
        try {
            const response = await fetch("/dip_state");
            const data = await response.json();

            const state = data.state || "NEUTRAL";

            if (window.DipMood) {
                window.DipMood.setMood(state, "poll");
            }
        } catch (e) {
            console.log("[STATE ERROR]", e);
        }
    }

    updateDipState();

    setInterval(updateDipState, 5000);
    </script>
   
</body>
</html>
